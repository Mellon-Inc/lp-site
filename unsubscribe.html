<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メルマガ配信停止 | 株式会社メロン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --teal:       #0f7c63;
      --teal-dark:  #0a5244;
      --teal-deep:  #072e25;
      --teal-mid:   #15a882;
      --teal-light: #f0faf7;
      --orange:     #f07030;
      --orange-h:   #d95e20;
      --text:       #111827;
      --muted:      #6b7280;
    }

    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', Meiryo, sans-serif;
      font-size: 17px;
      line-height: 1.8;
      color: var(--text);
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: rgba(7,46,37,.97);
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 44px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    header img { height: 26px; width: auto; }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(180deg, #0e7b62 0%, #0a5d49 50%, #073a2e 100%);
      padding: 72px 40px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }
    .hero-label {
      font-size: 11px;
      letter-spacing: 4px;
      font-weight: 700;
      color: var(--teal-mid);
      text-transform: uppercase;
      display: block;
      margin-bottom: 16px;
      position: relative;
    }
    .hero h1 {
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 900;
      color: #fff;
      line-height: 1.4;
      position: relative;
    }
    .hero p {
      color: rgba(255,255,255,0.72);
      font-size: 16px;
      margin-top: 16px;
      position: relative;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 20px;
      background: var(--teal-light);
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 56px 52px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 4px 40px rgba(15,124,99,.10);
      border: 1px solid #d1ece5;
    }

    .card h2 {
      font-size: 22px;
      font-weight: 800;
      color: var(--teal-dark);
      margin-bottom: 12px;
      text-align: center;
    }
    .card .desc {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 36px;
      line-height: 1.7;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--teal-dark);
      margin-bottom: 8px;
    }

    input[type="email"] {
      width: 100%;
      padding: 16px 20px;
      font-size: 16px;
      font-family: inherit;
      border: 2px solid #d1ece5;
      border-radius: 10px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 24px;
      color: var(--text);
    }
    input[type="email"]:focus {
      border-color: var(--teal-mid);
    }
    input[type="email"]::placeholder {
      color: #bbb;
    }

    button[type="submit"] {
      width: 100%;
      background: linear-gradient(180deg, #f5893e 0%, #e86520 100%);
      color: #fff;
      font-size: 17px;
      font-weight: 800;
      font-family: inherit;
      padding: 18px;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 5px 0 #b84d10, 0 8px 24px rgba(240,112,48,.35);
      transition: all .2s;
      letter-spacing: .3px;
    }
    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 0 #b84d10, 0 12px 30px rgba(240,112,48,.45);
    }
    button[type="submit"]:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #b84d10;
    }

    /* ── SUCCESS STATE ── */
    .success-msg {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--teal-light);
      border: 3px solid var(--teal-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }
    .success-msg h3 {
      font-size: 20px;
      font-weight: 800;
      color: var(--teal-dark);
      margin-bottom: 10px;
    }
    .success-msg p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── ERROR ── */
    .error-msg {
      display: none;
      background: #fff0f0;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #b91c1c;
      margin-bottom: 16px;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--teal-deep);
      padding: 32px 44px;
      text-align: center;
    }
    footer img { height: 22px; opacity: .7; margin-bottom: 10px; }
    footer p {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    @media (max-width: 600px) {
      header { padding: 0 24px; }
      .card { padding: 40px 28px; }
      .hero { padding: 56px 24px 44px; }
    }
  </style>
</head>
<body>

  <header>
    <img src="MellonInc_logo_ol_yoko_white_x6.png" alt="MellonInc">
  </header>

  <div class="hero">
    <span class="hero-label">Unsubscribe</span>
    <h1>メルマガ配信停止</h1>
    <p>ご登録のメールアドレスを入力して、配信停止の手続きを行ってください。</p>
  </div>

  <main>
    <div class="card">
      <h2>配信停止フォーム</h2>
      <p class="desc">
        以下にメールアドレスを入力し、「配信停止を申請する」ボタンを押してください。<br>
        順次対応いたします。
      </p>

      <!-- エラーメッセージ -->
      <div class="error-msg" id="errorMsg">
        送信に失敗しました。時間をおいて再度お試しください。
      </div>

      <!-- フォーム -->
      <form id="unsubForm" action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSdUj3g1-s0AHMd3JQ1Y-X80zQErt9m3OEK5sQVCmDUj1uTGiQ/formResponse" target="hidden_iframe" method="POST">
        <label for="email">メールアドレス</label>
        <input
          type="email"
          id="email"
          name="entry.1966257462"
          placeholder="example@email.com"
          required
          autocomplete="email"
        >
        <button type="submit" id="submitBtn">配信停止を申請する</button>
      </form>

      <!-- 送信完了メッセージ -->
      <div class="success-msg" id="successMsg">
        <div class="success-icon">✓</div>
        <h3>申請を受け付けました</h3>
        <p>
          配信停止の申請を受け付けました。<br>
          順次対応いたしますので、<br>
          しばらくお待ちください。
        </p>
      </div>
    </div>
  </main>

  <footer>
    <img src="MellonInc_logo_ol_yoko_white_x6.png" alt="MellonInc">
    <p>© 2025 Mellon Inc. All rights reserved.</p>
  </footer>

  <!-- Google Forms 送信用の hidden iframe -->
  <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

  <script>
    const form = document.getElementById('unsubForm');
    const successMsg = document.getElementById('successMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
      submitBtn.disabled = true;
      submitBtn.textContent = '送信中…';
      // iframeに送信し、少し待ってから完了表示
      setTimeout(function() {
        form.style.display = 'none';
        successMsg.style.display = 'block';
      }, 1500);
    });
  </script>

</body>
</html>
